# context-export.toml
#
# Patterns use .gitignore-style matching (gitwildmatch semantics).

[context_export]
# Exclusions apply to the FILE LIST (directory listing).
# Important files override these exclusions (except .git, which is always excluded).
exclude_from_dir_list = [
  ".git/",
  ".venv/",
  "__pycache__/",
  "dist/",
  "build/",
  "node_modules/",
  "test/stress/",
  "test/",
  "doc/",
  "test/stress/**/*",
]

# Files whose contents will always be included under "IMPORTANT FILE CONTENTS".
# Globs are allowed.
important_files = [
  # "README.md",
  "context-export.toml",
  "CMakeLists.txt",
  "!test/stress/**/CMakeLists.txt",
  "!test/stress/",
  "!test/stress/**/*",
  "src/**/*.cpp",
  "!src/tools/*.cpp",
  "src/**/*.hpp",
  "!context-export.toml",
  "!move_registry_debug.cpp",
  "!move_registry_debug.hpp",
  # "tests/**/*.py",
]

# If true, also apply patterns from the project's root .gitignore to the FILE LIST.
respect_gitignore = true
